version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: promptlib_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-promptlib}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-promptlib}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - promptlib_net

  redis:
    image: redis:7-alpine
    container_name: promptlib_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - promptlib_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: promptlib_backend
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-this-in-production-abc123}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      DB_NAME: ${DB_NAME:-promptlib}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    networks:
      - promptlib_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: promptlib_frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - promptlib_net

volumes:
  postgres_data:
  redis_data:

networks:
  promptlib_net:
    driver: bridge