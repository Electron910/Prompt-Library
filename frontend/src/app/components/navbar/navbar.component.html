<nav class="navbar">
  <div class="container navbar-inner">
    <a routerLink="/prompts" class="navbar-brand">
      <span class="brand-icon">◈</span>
      <span class="brand-text">Prompt Library</span>
    </a>

    <div class="navbar-links">
      <a routerLink="/prompts" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" class="nav-link">
        Library
      </a>

      <ng-container *ngIf="authService.currentUser$ | async as authState">
        <ng-container *ngIf="authState.authenticated; else loginBlock">
          <a routerLink="/add-prompt" routerLinkActive="active" class="nav-link">
            New Prompt
          </a>
          <button class="btn btn-ghost nav-btn" (click)="onLogout()">
            Logout
          </button>
          <span class="nav-user">{{ authState.user?.username }}</span>
        </ng-container>
        <ng-template #loginBlock>
          <a routerLink="/add-prompt" routerLinkActive="active" class="nav-link">
            New Prompt
          </a>
          <a routerLink="/login" routerLinkActive="active" class="btn btn-ghost nav-btn">
            Login
          </a>
        </ng-template>
      </ng-container>
    </div>
  </div>
</nav>
