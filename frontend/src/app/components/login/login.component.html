<div class="page-enter">
  <div class="container login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-icon">◈</div>
        <h1 class="login-title">Sign In</h1>
        <p class="login-subtitle">Access required to create prompts.</p>
      </div>

      <div class="alert alert-error" *ngIf="error">
        {{ error }}
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form" novalidate>

        <div class="form-field">
          <label for="username">Username</label>
          <input
            id="username"
            type="text"
            formControlName="username"
            placeholder="Enter username"
            [class.error]="isFieldInvalid(username)"
            autocomplete="username">
          <span class="error-message" *ngIf="isFieldInvalid(username) && username.errors?.['required']">
            Username is required.
          </span>
        </div>

        <div class="form-field">
          <label for="password">Password</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="Enter password"
            [class.error]="isFieldInvalid(password)"
            autocomplete="current-password">
          <span class="error-message" *ngIf="isFieldInvalid(password) && password.errors?.['required']">
            Password is required.
          </span>
        </div>

        <button type="submit" class="btn btn-primary submit-btn" [disabled]="submitting">
          <span class="spinner" *ngIf="submitting"></span>
          {{ submitting ? 'Signing in...' : 'Sign In' }}
        </button>
      </form>

      <div class="login-hint">
        <p>Use Django admin credentials. Create a superuser with:</p>
        <code>docker-compose exec backend python manage.py createsuperuser</code>
      </div>
    </div>
  </div>
</div>
